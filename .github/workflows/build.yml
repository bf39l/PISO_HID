name: Build Pico Firmware

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Initialize submodules (with fallback)
        shell: bash
        run: |
          set -eo pipefail
          git submodule sync --recursive
          if ! git submodule update --init --force --recursive; then
            echo "Recorded submodule commit missing; falling back to remote for FreeRTOS-Kernel"
            git -C lib/FreeRTOS-Kernel init || true
            git -C lib/FreeRTOS-Kernel remote set-url origin https://github.com/FreeRTOS/FreeRTOS-Kernel
            git -C lib/FreeRTOS-Kernel fetch origin main --depth=1
            git -C lib/FreeRTOS-Kernel checkout -q FETCH_HEAD
          fi

      - name: Install toolchain and build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Configure (CMake + Ninja)
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPICO_SDK_FETCH_FROM_GIT=1

      - name: Build
        run: cmake --build build --parallel

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PISO_HID-firmware
          path: |
            build/*.uf2
            build/*.elf
            build/*.hex
            build/*.bin
            build/*.dis
            build/*.map
          if-no-files-found: error
